name: Validate workflows

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "workflows/**"
      - "n8n-nodes-ramsisa"
      - ".gitmodules"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-workflows.yml"
  push:
    branches: [master]
    paths:
      - "workflows/**"
      - "n8n-nodes-ramsisa"
      - ".gitmodules"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dev-deps
        run: npm ci --ignore-scripts

      - name: Check workflow sanitization
        run: npm run sanitize:check

      - name: Validate workflows
        run: npm run validate
